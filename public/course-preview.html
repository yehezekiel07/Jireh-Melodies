<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jireh Melodies</title>
    <link href="style.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Manrope:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css"
    />

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css"
    />

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css"
    />
  </head>
  <body>
    <header class="header admin">
      <a href="admin-dashboard.html">
        <img
          class="logo"
          src="img/jireh-melodies-logo.png"
          alt="Jireh Melodies Logo"
        />
      </a>
      <nav class="main-nav">
        <ul class="main-nav-list">
          <li class="main-nav-list-item">
            <a class="main-nav-link" href="admin-dashboard.html">All Users</a>
          </li>
          <li class="main-nav-list-item active">
            <a class="main-nav-link" href="#">All Courses</a>
          </li>
          <li class="main-nav-list-item">
            <a class="main-nav-link" href="#">Account</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="section-all-courses">
        <div class="container">
          <div class="heading-cta">
            <h2 class="heading-secondary">Add Modules</h2>
          </div>

          <!doctype html>
          <html>
            <head>
              <title>Course Preview</title>
              <link rel="stylesheet" href="style.css" />
            </head>

            <body>
              <section class="course-preview">
                <div class="course-header">
                  <img id="courseThumbnail" />

                  <div class="course-info">
                    <h1 id="courseTitle"></h1>

                    <p id="courseDescription"></p>

                    <div class="course-meta">
                      <span id="courseInstructor"></span>
                      <span id="courseLanguage"></span>
                    </div>

                    <div class="course-price">
                      <span id="coursePrice"></span>
                      <span id="courseOriginalPrice"></span>
                    </div>
                  </div>
                </div>

                <div class="course-content">
                  <h2>What you'll learn</h2>
                  <ul id="learnPoints"></ul>

                  <h2>Requirements</h2>
                  <ul id="requirements"></ul>

                  <h2>This course includes</h2>
                  <ul id="courseIncludes"></ul>
                </div>

                <div class="course-curriculum">
                  <h2>Course Content</h2>

                  <div id="modulesContainer"></div>
                </div>

                <div class="preview-buttons">
                  <button
                    id="backToModules"
                    type="button"
                    class="btn btn--secondary"
                  >
                    Back
                  </button>

                  <button
                    id="publishCourse"
                    type="button"
                    class="btn btn--primary"
                  >
                    Save & Publish
                  </button>
                </div>
              </section>

              <script src="js/course-preview.js"></script>
            </body>
          </html>
        </div>
      </section>
    </main>
  </body>
</html>
